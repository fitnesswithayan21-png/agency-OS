image: node:20

stages:
  - verify

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/

verify:
  stage: verify
  script:
    - npm install
    - npm run typecheck
    - npm run build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
